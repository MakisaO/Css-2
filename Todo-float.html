<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo1</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .chat-app {
        margin: auto;
        width: 500px;
        height: 800px;
        border: solid 1px black;
        border-radius: 10px;
        overflow: hidden;
      }
      .chat-app header {
        display: flex;
        background-color: blue;
        height: 15%;
        color: white;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        font-weight: bold;
      }
      .chat-app .message {
        height: 75%;
        border-bottom: solid 1px black;
        overflow: auto;
      }
      .chat-app .message .right {
        float: right;
        border: solid 1px white;
        padding: 10px;
        margin-right: 10px;
        border-radius: 20px;
        background-color: blue;
        color: white;
        font-size: 20px;
        clear: both;
      }
      .chat-app .message .left {
        float: left;
        border: solid 1px white;
        padding: 10px;
        margin-right: 10px;
        border-radius: 20px;
        background-color: rgb(238, 226, 226);
        color: black;
        font-size: 20px;
        clear: both;
      }
      .chat-app .messageBox {
        height: 10%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(240, 235, 235);
      }
      .chat-app .messageBox .text {
        height: 50px;
        width: 350px;
        border: solid 1px gray;
        border-radius: 30px;
        padding: 10px;
        font-size: 15px;
        outline: none;
      }
      .chat-app .messageBox .send {
        margin: 10px;
        height: 50px;
        width: 100px;
        border: hidden;
        background-color: blue;
        color: white;
        border-radius: 30px;
        padding: 10px;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="chat-app">
      <header>CHAT APP</header>
      <div class="message">
        <div class="right">You are my bae love :abby</div>
        <div class="left">JK: ooooooo</div>
        <div class="right">lanuge:Abby</div>
        <div class="left">JK: YOu are my bae</div>
        <div class="right">cry:Abby</div>
        <div class="left">JK: You got it right</div>
        <div class="right">yeah:abby</div>
        <div class="left">JK: eiei</div>
        <div class="right">how are you</div>
        <div class="left">test</div>
        <div class="right">aka</div>
        <div class="left">beed</div>
        <div class="right">Yxs</div>
        <div class="left">my own</div>
      </div>
      <div class="messageBox">
        <input type="text" placeholder="Type a message..." class="text" />
        <button class="send">Send</button>
      </div>
    </div>
  </body>
</html>
