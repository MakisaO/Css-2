<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float layout</title>
    <style>
    body{
            display: block;
    }
    header {
        background-color: rgb(230, 230, 113);
        height: 50px;
    }
    nav {
        background-color: aqua;
        width: 25%;
        height: 100px;
        float: left;
    }
    main {
        background-color: rgb(210, 21, 153);
        width: 50%;
        height: 100px;
        float: left;
    }
    aside{
        background-color: rgb(124, 56, 17);
        width: 25%;
        height: 100px;
        float: left;
    }
    footer{
        background-color: rgb(0, 243, 53);
        height: 50px;
        clear: both;
    }
    </style>
</head>

<body>
    <header>header</header>
    <nav>nav</nav>
    <main>main</main>
    <aside>aside</aside>
    <footer>footer</footer>
</body>
</html>
