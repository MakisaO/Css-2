<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebookpost</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f2f5;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .post {
        display: flex;
        flex-direction: column;
        width: 100%;
        min-height: 700px;
        max-width: 600px;
        background-color: rgb(230, 230, 236);
        border-radius: 8px;
        padding: 15px;
        gap: 10px;
      }
      .profile-area {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .profile-pic {
        height: 50px;
        width: 50px;
        border-radius: 100%;
        object-fit: cover;
        cursor: pointer;
      }
      .user-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .title {
        display: flex;
        font-size: 15px;
        font-weight: bolder;
        gap: 5px;
        cursor: pointer;
      }
      .title img {
        height: 15px;
        width: 15px;
        object-fit: cover;
      }
      .sponsertext {
        display: flex;
        font-size: 11px;
        color: #a6a1a1;
        align-items: center;
        gap: 2px;
      }
      .logopublic {
        width: 10px;
        height: 10px;
        object-fit: cover;
      }

      .post-options {
        display: flex;
        gap: 10px;
        cursor: pointer;
      }
      .description {
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="post">
      <header>
        <div class="profile-area">
          <img
            class="profile-pic"
            src="/image/logoMongoDB.jpg"
            alt="dowloadMongoDB"
          />
          <div class="user-info">
            <div class="title">
              MongoDB<img src="/image/verify logo.png" alt="dowloadverify" />
            </div>
            <span class="sponsertext">
              ได้รับการสนับสนุน ·<img
                class="logopublic"
                src="image/public.png"
              />
            </span>
          </div>
        </div>
        <div class="post-options">
          <span>&hellip;</span>
          <span>&#x2715;</span>
        </div>
      </header>
      <div class="description">
        Take advantage of your SQL skillset to quickly get up to speed on
        MongoDB. Don't start over, just start!
      </div>
    </div>
  </body>
</html>
