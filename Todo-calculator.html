    <title>calculator</title>

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        background-color: rgb(90, 90, 252);
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(6, 60px);
        width: 350px;
        border: solid 1px black;
        background-color: white;
        grid-gap: 10px;
        padding: 20px;
        grid-template-areas:
          "displays displays displays displays"
          "Operators1 Operators2 Operators3 Operators4"
          "number7 number8 number9 number4"
          "number5 number6 number1 number2"
          "number3 number0 dot clear"
          "equal equal . .";
      }
      .container .displays {
        grid-area: displays;
        display: flex;
        background-color: rgb(245, 239, 239);
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 15px;
        font-size: 50px;
        align-items: center;
        justify-content: flex-end;
        padding: 20px;
      }
      .container .Operators1 {
        display: flex;
        grid-area: Operators1;
        background-color: rgb(245, 239, 239);
