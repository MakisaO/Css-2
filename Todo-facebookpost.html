<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebookpost</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f2f5;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .post {
        display: flex;
        flex-direction: column;
        width: 100%;
        min-height: 700px;
        max-width: 600px;
        background-color: rgb(255, 255, 255);
        border-radius: 8px;
        padding: 15px;
        gap: 10px;
      }
      .profile-area {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .profile-pic {
        height: 35px;
        width: 35px;
        border-radius: 100%;
        object-fit: cover;
        cursor: pointer;
      }
      .user-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .title {
        display: flex;
        font-size: 15px;
        font-weight: bolder;
        gap: 5px;
        cursor: pointer;
      }
      .title img {
        height: 15px;
        width: 15px;
        object-fit: cover;
      }
      .sponsertext {
        display: flex;
        font-size: 11px;
        color: #a6a1a1;
        align-items: center;
        gap: 2px;
      }
      .logopublic {
        width: 10px;
        height: 10px;
        object-fit: cover;
      }

      .post-options {
        display: flex;
        gap: 10px;
        cursor: pointer;
      }
      .description {
        font-size: 14px;
        line-height: 1.5;
      }

      .post-attachment {
        margin: 0 -15px;
      }
      .post-img {
        width: 100%;
        display: block;
        object-fit: cover;
      }
      .link-preview-container {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        background-color: #f0f2f5;
        padding: 10px;
      }
      .link-text-info {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .url {
        font-size: 12px;
        color: #65676b;
      }
      .link-title {
        font-size: 15px;
        font-weight: bold;
        color: #050505;
      }
      .subtitle {
        font-size: 12px;
        color: #65676b;
      }
      .Register {
        border: none;
        border-radius: 8px;
        padding: 8px;
        flex-shrink: 0;
        font-weight: bold;
        font-size: 15px;
        background-color: #e4e6eb;
        cursor: pointer;
      }
      .like-comment-share {
        display: flex;
        justify-content: space-between;
        color: #a6a1a1;
        font-size: 15px;
      }
      .comment-share {
        display: flex;
        gap: 10px;
      }
      .like,
      .comment,
      .share {
        cursor: pointer;
      }
      .action-buttons {
        display: flex;
        border-top: 1px solid #a0a2a5;
        padding-top: 5px;
      }
      .action-btn {
        flex: 1;
        border: none;
        background-color: transparent;
        cursor: pointer;
        font-size: 15px;
        font-weight: bold;
      }
      .action-btn:hover {
        background-color: #f0f2f5;
      }
    </style>
  </head>
  <body>
    <div class="post">
      <header>
        <div class="profile-area">
          <img
            class="profile-pic"
            src="/image/logoMongoDB.jpg"
            alt="dowloadMongoDB"
          />
          <div class="user-info">
            <div class="title">
              MongoDB<img src="/image/verify logo.png" alt="dowloadverify" />
            </div>
            <span class="sponsertext">
              ได้รับการสนับสนุน ·<img
                class="logopublic"
                src="image/public.png"
              />
            </span>
          </div>
        </div>
        <div class="post-options">
          <span>&hellip;</span>
          <span>&#x2715;</span>
        </div>
      </header>

      <div class="description">
        Take advantage of your SQL skillset to quickly get up to speed on
        MongoDB. Don't start over, just start!
      </div>

      <div class="post-attachment">
        <img
          src="/image/mongoDBads.jpg"
          alt="download image"
          class="post-img"
        />

        <div class="link-preview-container">
          <div class="link-text-info">
            <div class="url">LEARN.MONGODB.COM</div>
            <div class="link-title">Register today for free!</div>
            <div class="subtitle">
              Are you a SQL developer who wants to use MongoDB? MongoDB
              University...
            </div>
          </div>
          <button type="button" class="Register">ลงทะเบียน</button>
        </div>
      </div>

      <div class="like-comment-share">
        <div class="like">👍 2.4 พัน</div>
        <div class="comment-share">
          <div class="comment">103 ความคิดเห็น</div>
          <div class="share">แชร์ 45 ครั้ง</div>
        </div>
      </div>

      <div class="action-buttons">
        <button type="button" class="action-btn">👍ถูกใจ</button>
        <button type="button" class="action-btn">💬แสดงความคิดเห็น</button>
        <button type="button" class="action-btn">➦แชร์</button>
      </div>
    </div>
  </body>
</html>
